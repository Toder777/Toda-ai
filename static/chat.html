<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Toda – AI агент на LangGraph + DeepSeek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2c;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2c;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f3c3, #70e0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo small {
            font-size: 0.7rem;
            color: #6a6a6a;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        .new-chat-btn {
            margin-top: 16px;
            width: 100%;
            background: #2c6e4f;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #3e8e68;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .chat-item:hover {
            background: #252525;
        }

        .chat-item.active {
            background: #2c2c2c;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-name.editable {
            background: #2c2c2c;
            border: 1px solid #4caf50;
            border-radius: 6px;
            padding: 2px 6px;
            outline: none;
            white-space: normal;
        }

        .chat-preview {
            font-size: 0.7rem;
            color: #6a6a6a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .delete-chat {
            background: none;
            border: none;
            color: #6a6a6a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .chat-item:hover .delete-chat {
            opacity: 1;
        }

        .delete-chat:hover {
            background: #3a2a2a;
            color: #ff6b6b;
        }

        /* Основная область */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #1a1a1a;
            border-bottom: 1px solid #2c2c2c;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .current-chat-name {
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .current-chat-name:hover {
            background: #2c2c2c;
        }

        .status {
            font-size: 0.75rem;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* Контейнер сообщений */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Сообщения */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #2a2a2a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .assistant .avatar {
            background: #1e3a2f;
            color: #6fcf97;
        }

        .user .avatar {
            background: #2c2c3a;
            color: #b0b0ff;
        }

        .bubble {
            background: #1e1e1e;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 70%;
            line-height: 1.45;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #2c6e4f;
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: #242424;
            border-bottom-left-radius: 4px;
        }

        .bubble pre {
            background: #0d0d0d;
            padding: 8px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 0.8rem;
        }

        .bubble code {
            font-family: monospace;
            font-size: 0.85rem;
        }

        .file-attachment {
            display: inline-block;
            background: #2a2a2a;
            border-radius: 12px;
            padding: 6px 12px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #70e0b0;
        }

        /* Индикатор печати */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 6px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #6fcf97;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Форма ввода */
        .input-area {
            background: #1a1a1a;
            border-top: 1px solid #2c2c2c;
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: #252525;
            border-radius: 28px;
            padding: 6px 12px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ececf0;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            padding: 8px 0;
            max-height: 100px;
        }

        .input-wrapper textarea::placeholder {
            color: #6a6a6a;
        }

        .attach-btn {
            background: none;
            border: none;
            color: #6a6a6a;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            background: #2c2c2c;
            color: #70e0b0;
        }

        .send-btn {
            background: #2c6e4f;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #3e8e68;
        }

        .send-btn:disabled {
            background: #3a3a3a;
            cursor: not-allowed;
        }

        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            color: #5a5a5a;
            margin-top: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Адаптивность */
        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
                margin-right: 12px;
                background: none;
                border: none;
                color: white;
                font-size: 1.5rem;
                cursor: pointer;
            }
        }

        .menu-toggle {
            display: none;
        }

        /* Скрытый input для файлов */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Toda <small>AI Agent</small></div>
            <button class="new-chat-btn" id="newChatBtn">➕ Новый чат</button>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="current-chat-name" id="currentChatName"></div>
            </div>
            <div class="status">
                <span class="status-dot"></span> онлайн
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messagesList"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="attach-btn" id="attachBtn" title="Прикрепить файл">📎</button>
                <textarea id="promptInput" rows="1" placeholder="Задайте вопрос или дайте команду..."></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div class="footer-note">↩ Enter – отправить, Shift+Enter – новая строка, 📎 – прикрепить файл</div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple>

<script>
    // Управление чатами
    let chats = [];
    let currentChatId = null;
    let isLoading = false;

    const sidebar = document.getElementById('sidebar');
    const chatsList = document.getElementById('chatsList');
    const messagesList = document.getElementById('messagesList');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatContainer = document.getElementById('chatContainer');
    const currentChatNameSpan = document.getElementById('currentChatName');
    const newChatBtn = document.getElementById('newChatBtn');
    const menuToggle = document.getElementById('menuToggle');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');

    // Загрузка чатов из localStorage
    function loadChats() {
        const saved = localStorage.getItem('toda_chats');
        if (saved) {
            chats = JSON.parse(saved);
        }
        if (chats.length === 0) {
            chats.push({
                id: generateId(),
                name: 'Чат 1',
                messages: [
                    {
                        role: 'assistant',
                        text: 'Привет! Я Toda, AI агент на LangGraph. Я умею создавать и читать файлы, искать в интернете, показывать погоду, выполнять команды и сохранять заметки. Также вы можете прикреплять файлы для анализа. Чем могу помочь?'
                    }
                ],
                createdAt: Date.now()
            });
        }
        saveChats();
        if (!currentChatId && chats.length > 0) {
            currentChatId = chats[0].id;
        }
        renderChatsList();
        renderCurrentChat();
    }

    function saveChats() {
        localStorage.setItem('toda_chats', JSON.stringify(chats));
    }

    function generateId() {
        return Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function renderChatsList() {
        chatsList.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
            const lastMsg = chat.messages.length > 1 ? chat.messages[chat.messages.length - 1].text.substring(0, 40) : 'Новый чат';
            div.innerHTML = `
                <div class="chat-info">
                    <div class="chat-name" data-id="${chat.id}">${escapeHtml(chat.name)}</div>
                    <div class="chat-preview">${escapeHtml(lastMsg)}</div>
                </div>
                <button class="delete-chat" data-id="${chat.id}">🗑️</button>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-chat')) return;
                if (e.target.classList.contains('chat-name')) return;
                switchChat(chat.id);
            });
            // Двойной клик для переименования в боковой панели
            const chatNameDiv = div.querySelector('.chat-name');
            chatNameDiv.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                renameChatInline(chat.id, chatNameDiv);
            });
            const deleteBtn = div.querySelector('.delete-chat');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteChat(chat.id);
            });
            chatsList.appendChild(div);
        });
    }

    function renameChatInline(chatId, element) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        const oldName = chat.name;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = oldName;
        input.className = 'chat-name editable';
        input.style.width = element.offsetWidth + 'px';
        element.replaceWith(input);
        input.focus();
        input.addEventListener('blur', () => {
            const newName = input.value.trim() || 'Чат';
            chat.name = newName;
            saveChats();
            renderChatsList();
            if (currentChatId === chatId) {
                currentChatNameSpan.textContent = newName;
            }
        });
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                input.blur();
            }
        });
    }

    function switchChat(chatId) {
        currentChatId = chatId;
        renderChatsList();
        renderCurrentChat();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
        }
    }

    function renderCurrentChat() {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        currentChatNameSpan.textContent = chat.name;
        messagesList.innerHTML = '';
        chat.messages.forEach(msg => {
            addMessageToUI(msg.role, msg.text, false);
        });
        scrollToBottom();
    }

    function addMessageToUI(role, text, save = true) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const avatar = role === 'user' ? '👤' : '🤖';
        div.innerHTML = `
            <div class="avatar">${avatar}</div>
            <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        `;
        messagesList.appendChild(div);
        if (save) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages.push({ role, text });
                saveChats();
                renderChatsList();
            }
        }
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 100);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="avatar">🤖</div>
            <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
        `;
        messagesList.appendChild(typingDiv);
        scrollToBottom();
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessageWithFile(file = null) {
        let text = promptInput.value.trim();
        if ((!text && !file) || isLoading) return;

        isLoading = true;
        sendBtn.disabled = true;
        promptInput.disabled = true;

        let fileContent = null;
        let fileName = null;

        if (file) {
            fileName = file.name;
            fileContent = await readFileAsText(file);
            if (!text) {
                text = `Проанализируй содержимое файла "${fileName}"`;
            }
            addMessageToUI('user', `📎 ${fileName}\n${text}`, true);
        } else {
            addMessageToUI('user', text, true);
        }

        promptInput.value = '';
        promptInput.style.height = 'auto';
        showTyping();

        try {
            let requestBody = { message: text, thread_id: currentChatId };
            if (fileContent) {
                requestBody.file = {
                    name: fileName,
                    content: fileContent.substring(0, 50000) // ограничение 50к символов
                };
            }
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            removeTyping();
            addMessageToUI('assistant', data.response, true);
        } catch (err) {
            removeTyping();
            addMessageToUI('assistant', `❌ Ошибка: ${err.message}. Убедитесь, что backend запущен.`, true);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            promptInput.disabled = false;
            promptInput.focus();
        }
    }

    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsText(file, 'UTF-8');
        });
    }

    function createNewChat() {
        const newId = generateId();
        const newChat = {
            id: newId,
            name: `Чат ${chats.length + 1}`,
            messages: [
                {
                    role: 'assistant',
                    text: 'Новый чат создан. Чем могу помочь?'
                }
            ],
            createdAt: Date.now()
        };
        chats.push(newChat);
        saveChats();
        switchChat(newId);
    }

    function deleteChat(chatId) {
        if (chats.length === 1) {
            alert('Нельзя удалить последний чат');
            return;
        }
        chats = chats.filter(c => c.id !== chatId);
        if (currentChatId === chatId) {
            currentChatId = chats[0].id;
        }
        saveChats();
        renderChatsList();
        renderCurrentChat();
    }

    function renameCurrentChat() {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        const newName = prompt('Введите новое имя чата:', chat.name);
        if (newName && newName.trim()) {
            chat.name = newName.trim();
            saveChats();
            renderChatsList();
            currentChatNameSpan.textContent = chat.name;
        }
    }

    // Обработчики
    newChatBtn.addEventListener('click', createNewChat);
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
    });
    currentChatNameSpan.addEventListener('click', renameCurrentChat);
    attachBtn.addEventListener('click', () => {
        fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) {
            sendMessageWithFile(files[0]);
        }
        fileInput.value = '';
    });

    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessageWithFile();
        }
    });

    sendBtn.addEventListener('click', () => sendMessageWithFile());

    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 640) {
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        }
    });

    loadChats();
    promptInput.focus();
</script>
</body>
</html>
